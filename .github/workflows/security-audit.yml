name: Security Audit

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > audit.json || true
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json

  dependabot-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Dependabot
        run: echo "Dependabot runs on schedule; ensure .github/dependabot.yml exists"
