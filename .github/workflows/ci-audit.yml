name: CI — Audit, Build, Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  audit-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
      - name: Run tests
        run: npm test --silent || true
      - name: Build
        run: npm run build
